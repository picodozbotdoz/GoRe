version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
    - misspell
    - unconvert
    - gosec

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - linters:
          - revive
        text: "exported.*should have comment"
      - linters:
          - revive
        text: "package comment"
      - linters:
          - errcheck
        text: "Error return value of `.*Close` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `fmt\\.Fprint`"
      - linters:
          - errcheck
        text: "Error return value of `w\\.Write`"
      - linters:
          - errcheck
        text: "Error return value of `io\\.Copy`"
      - linters:
          - errcheck
        text: "Error return value of `ln\\.Close`"
      - linters:
          - errcheck
        text: "Error return value of `conn\\.Close`"
      - linters:
          - errcheck
        text: "Error return value of `gz\\.Close`"
      - linters:
          - errcheck
        text: "Error return value of `w\\.gz\\.Flush`"
      - linters:
          - errcheck
        text: "Error return value of `writer\\." 
      - linters:
          - errcheck
        text: "Error return value of `fmt\\.Fprintln`"
      - linters:
          - errcheck
        text: "Error return value of `fmt\\.Fprintf`"
      - linters:
          - errcheck
        text: "Error return value of `srv\\.Stop`"
      - linters:
          - errcheck
        text: "Error return value of `h3\\.Shutdown`"
      - linters:
          - gosec
        text: "G304: Potential file inclusion"
      - linters:
          - gosec
        text: "G302: Expect file permissions"
      - linters:
          - gosec
        text: "G703: Path traversal"
      - linters:
          - gosec
        text: "G115: integer overflow"
      - linters:
          - gosec
        text: "G704: SSRF"
      - linters:
          - gosec
        text: "G401: Use of weak cryptographic"
      - linters:
          - staticcheck
        text: "SA1019:.*h2c"
      - linters:
          - gosec
        text: "G710: Open redirect"
      - linters:
          - gosec
        text: "G104: Errors unhandled"
      - linters:
          - gosec
        text: "G501: Blocklisted import"
      - linters:
          - revive
        text: "unused-parameter"
      - linters:
          - staticcheck
        text: "QF1003"
      - linters:
          - staticcheck
        text: "ST1013"
      - linters:
          - gosec
        text: "G705: XSS"

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  go: "1.26"
